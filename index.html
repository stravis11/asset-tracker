<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard - BTC, SOL, ETH</title>
    <link href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00d4ff;
        }

        .timeframe-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .timeframe-btn {
            padding: 8px 16px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .timeframe-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        .timeframe-btn.active {
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            color: #1a1a2e;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
        }

        .chart-container {
            margin-top: 20px;
            position: relative;
            height: 200px;
            width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        #updateChartBtn {
            margin-top: 15px;
            padding: 8px 20px;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            border: none;
            border-radius: 20px;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #updateChartBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 255, 136, 0.4);
        }

        #updateChartBtn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .last-updated {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .crypto-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .crypto-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .crypto-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
        }

        .crypto-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btc .crypto-icon {
            background: linear-gradient(45deg, #f7931a, #ffb347);
            color: white;
        }

        .eth .crypto-icon {
            background: linear-gradient(45deg, #627eea, #a5b4fc);
            color: white;
        }

        .sol .crypto-icon {
            background: linear-gradient(45deg, #00ffa3, #7024e4);
            color: white;
        }

        .crypto-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .crypto-price {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .change-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .change-label {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .change-value {
            display: inline-flex;
            align-items: center;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .change-positive {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .change-negative {
            background: rgba(255, 0, 118, 0.2);
            color: #ff0076;
        }

        .change-neutral {
            background: rgba(160, 160, 160, 0.2);
            color: #a0a0a0;
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 20px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .crypto-price {
                font-size: 2rem;
            }

            .dashoard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Crypto Dashboard</h1>
            <div id="lastUpdated" class="last-updated">Updating...</div>
            <div id="statusIndicator" class="status-indicator">
                <div class="pulse"></div>
                <span>Live Updates Every 5 Minutes</span>
            </div>
        </header>

        <div id="loading" class="loading-spinner"></div>

        <div class="dashboard-grid" id="dashboard" style="display: none;">
            <!-- Bitcoin Card -->
            <div class="crypto-card btc">
                <div class="crypto-icon">₿</div>
                <div class="crypto-name">Bitcoin</div>
                <div class="crypto-price" id="btc-price">$70,000.00</div>
                <div class="change-container">
                    <span class="change-label">24h Change:</span>
                    <span class="change-value change-neutral" id="btc-change">--</span>
                </div>

                <h2>📈 Price History</h2>
                <div id="btc-chart-container" class="chart-container">
                    <canvas id="btc-chart" style="background: rgba(0, 212, 255, 0.1);"></canvas>
                </div>
                <div class="timeframe-selector">
                    <button class="timeframe-btn active" data-crypto="btc" data-days="1">24H</button>
                    <button class="timeframe-btn" data-crypto="btc" data-days="7">1W</button>
                    <button class="timeframe-btn" data-crypto="btc" data-days="30">1M</button>
                    <button class="timeframe-btn" data-crypto="btc" data-days="90">3M</button>
                    <button class="timeframe-btn" data-crypto="btc" data-days="180">6M</button>
                    <button class="timeframe-btn" data-crypto="btc" data-days="365">1Y</button>
                </div>
                <button class="update-chart-btn" data-crypto="btc">Update Chart</button>
            </div>

            <!-- Ethereum Card -->
            <div class="crypto-card eth">
                <div class="crypto-icon">Ξ</div>
                <div class="crypto-name">Ethereum</div>
                <div class="crypto-price" id="eth-price">$2,000.00</div>
                <div class="change-container">
                    <span class="change-label">24h Change:</span>
                    <span class="change-value change-neutral" id="eth-change">--</span>
                </div>

                <h2>📈 Price History</h2>
                <div id="eth-chart-container" class="chart-container">
                    <canvas id="eth-chart" style="background: rgba(98, 126, 234, 0.1);"></canvas>
                </div>
                <div class="timeframe-selector">
                    <button class="timeframe-btn active" data-crypto="eth" data-days="1">24H</button>
                    <button class="timeframe-btn" data-crypto="eth" data-days="7">1W</button>
                    <button class="timeframe-btn" data-crypto="eth" data-days="30">1M</button>
                    <button class="timeframe-btn" data-crypto="eth" data-days="90">3M</button>
                    <button class="timeframe-btn" data-crypto="eth" data-days="180">6M</button>
                    <button class="timeframe-btn" data-crypto="eth" data-days="365">1Y</button>
                </div>
                <button class="update-chart-btn" data-crypto="eth">Update Chart</button>
            </div>

            <!-- Solana Card -->
            <div class="crypto-card sol">
                <div class="crypto-icon">◈</div>
                <div class="crypto-name">Solana</div>
                <div class="crypto-price" id="sol-price">$80.00</div>
                <div class="change-container">
                    <span class="change-label">24h Change:</span>
                    <span class="change-value change-neutral" id="sol-change">--</span>
                </div>

                <h2>📈 Price History</h2>
                <div id="sol-chart-container" class="chart-container">
                    <canvas id="sol-chart" style="background: rgba(0, 255, 163, 0.1);"></canvas>
                </div>
                <div class="timeframe-selector">
                    <button class="timeframe-btn active" data-crypto="sol" data-days="1">24H</button>
                    <button class="timeframe-btn" data-crypto="sol" data-days="7">1W</button>
                    <button class="timeframe-btn" data-crypto="sol" data-days="30">1M</button>
                    <button class="timeframe-btn" data-crypto="sol" data-days="90">3M</button>
                    <button class="timeframe-btn" data-crypto="sol" data-days="180">6M</button>
                    <button class="timeframe-btn" data-crypto="sol" data-days="365">1Y</button>
                </div>
                <button class="update-chart-btn" data-crypto="sol">Update Chart</button>
            </div>
        </div>
    </div>

    <script>
        // Cryptocurrencies to track
        const CRYPTO_IDS = ['bitcoin', 'ethereum', 'solana'];
        const CRYPTO_NAMES = {
            'bitcoin': { name: 'Bitcoin', symbol: '₿', id: 'btc' },
            'ethereum': { name: 'Ethereum', symbol: 'Ξ', id: 'eth' },
            'solana': { name: 'Solana', symbol: '◈', id: 'sol' }
        };

        // Store Chart.js instances
        const charts = {
            btc: null,
            eth: null,
            sol: null
        };

        // Colors for each chart
        const chartColors = {
            btc: '#f7931a',
            eth: '#627eea',
            sol: '#00ffa3'
        };

        // Fetch crypto data from CoinGecko API
        async function fetchCryptoData() {
            try {
                const url = new URL('https://api.coingecko.com/api/v3/simple/price');
                url.searchParams.set('ids', CRYPTO_IDS.join(','));
                url.searchParams.set('vs_currencies', 'usd');
                url.searchParams.set('include_24h_change', 'true');

                const response = await fetch(url.toString());
                if (!response.ok) throw new Error('API request failed');
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching crypto data:', error);
                return null;
            }
        }

        // Fetch historical price data
        async function fetchHistoricalData(coinId, days) {
            console.log(`Fetching historical data for ${coinId}, ${days} days`);
            try {
                const url = new URL(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart`);
                url.searchParams.set('vs_currency', 'usd');
                url.searchParams.set('days', days.toString());
                url.searchParams.set('interval', days < 7 ? 'hourly' : 'daily');

                console.log(`Fetching: ${url.toString()}`);
                
                const response = await fetch(url.toString());
                if (!response.ok) {
                    console.error(`API response not ok:`, response.status, response.statusText);
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                console.log(`API returned: prices=${data.prices?.length || 0}, market_caps=${data.market_caps?.length || 0}`);
                
                // Return just the prices array (it's already in the right format: [[timestamp, price], ...])
                if (data.prices && data.prices.length > 0) {
                    console.log(`Success! Returning ${data.prices.length} data points`);
                    return data.prices;
                } else {
                    console.error(`No prices data in response`);
                    return null;
                }
            } catch (error) {
                console.error(`Error fetching historical data for ${coinId}:`, error.message);
                return null;
            }
        }

        // Create chart for a cryptocurrency
        function createChart(cryptoId, ctx, color) {
            console.log(`createChart for ${cryptoId}, ctx:`, !!ctx);
            
            if (ctx) {
                if (charts[cryptoId]) {
                    console.log(`Destroying existing chart for ${cryptoId}`);
                    charts[cryptoId].destroy();
                }

                charts[cryptoId] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Price (USD)',
                            data: [],
                            borderColor: color,
                            backgroundColor: color + '20',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                backgroundColor: 'rgba(26, 26, 46, 0.9)',
                                titleColor: '#00d4ff',
                                bodyColor: '#ffffff',
                                borderColor: 'rgba(0, 212, 255, 0.3)',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: true,
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.parsed.y !== null) {
                                            label += new Intl.NumberFormat('en-US', {
                                                style: 'currency',
                                                currency: 'USD'
                                            }).format(context.parsed.y);
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)'
                                },
                                ticks: {
                                    color: '#a0a0a0',
                                    maxTicksLimit: 8,
                                    callback: function(value, index, values) {
                                        const date = this.getLabelForValue(value);
                                        if (date instanceof Date) {
                                            return date.toLocaleDateString('en-US', {
                                                month: 'short',
                                                day: 'numeric'
                                            });
                                        }
                                        return date;
                                    }
                                }
                            },
                            y: {
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)'
                                },
                                ticks: {
                                    color: '#a0a0a0',
                                    callback: function(value) {
                                        return '$' + value.toLocaleString();
                                    }
                                }
                            }
                        },
                        animation: {
                            duration: 500,
                            easing: 'easeOutQuart'
                        }
                    }
                });
                
                console.log(`Created chart for ${cryptoId}:`, charts[cryptoId]);
            } else {
                console.error(`createChart: No context for ${cryptoId}`);
            }
        }

        // Update chart with data
        function updateChartData(cryptoId, prices, color) {
            const canvas = document.getElementById(`${cryptoId}-chart`);
            const ctx = canvas?.getContext('2d');

            // Get labels and prices
            const labels = prices.map(item => {
                const date = new Date(item[0]);
                return date.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric'
                });
            });
            const priceValues = prices.map(item => item[1]);
            
            console.log(`updateChartData: ${labels.length} labels, ${priceValues.length} values`);

            if (charts[cryptoId]) {
                console.log(`Updating existing chart for ${cryptoId}`);
                charts[cryptoId].data.labels = labels;
                charts[cryptoId].data.datasets[0].data = priceValues;
                charts[cryptoId].update('none');
            } else {
                console.log(`Creating NEW chart for ${cryptoId}`);
                createChart(cryptoId, ctx, color);
                // Force update to draw immediately
                if (charts[cryptoId]) {
                    charts[cryptoId].data.labels = labels.slice(0, 10);
                    charts[cryptoId].data.datasets[0].data = priceValues.slice(0, 10);
                    charts[cryptoId].update();
                }
            }
        }

        // Fetch and update chart
        async function updateChart(cryptoId, days, btnContext = null) {
            let updateBtn;
            let btnContainer;
            
            console.log(`updateChart called for ${cryptoId}, days: ${days}`);
            
            if (btnContext) {
                // When called from a timeframe button
                updateBtn = btnContext.querySelector('.update-chart-btn');
                btnContainer = btnContext;
                
                if (!updateBtn) {
                    console.error(`Could not find update button in context:`, btnContext);
                    return;
                }
            } else {
                // When called from the Update Chart button
                updateBtn = document.querySelector(`.update-chart-btn[data-crypto="${cryptoId}"]`);
                if (!updateBtn) {
                    console.error(`Could not find update button for ${cryptoId}`);
                    return;
                }
                btnContainer = updateBtn.closest('.crypto-card');
            }
            
            if (!btnContainer) {
                console.error(`Could not find card container for ${cryptoId}`);
                return;
            }
            
            console.log(`updateChart: Found container, setting active button to ${days} days`);
            
            // Set active timeframe button - but only within THIS card!
            const timeFrameBtns = btnContainer.querySelectorAll('.timeframe-btn');
            timeFrameBtns.forEach(btn => {
                const shouldBeActive = btn.dataset.days === days.toString();
                btn.classList.toggle('active', shouldBeActive);
            });

            // Disable update button during fetch
            updateBtn.disabled = true;

            try {
                // Use coinId (bitcoin/ethereum/solana) NOT cryptoId (btc/eth/sol) for the API
                const data = await fetchHistoricalData(coinId, days);
                console.log(`updateChart: Retrieved ${data?.prices?.length || 0} data points`);
                if (data && data.prices && data.prices.length > 0) {
                    updateChartData(cryptoId, data.prices, chartColors[cryptoId]);
                } else {
                    console.error(`No data returned for ${cryptoId}`);
                    alert('No chart data available');
                }
            } catch (error) {
                console.error(`Failed to update ${cryptoId} chart:`, error);
                alert(`Failed to load chart data: ${error.message}`);
            } finally {
                updateBtn.disabled = false;
            }
        }

        // Update UI with crypto data
        function updateUI(data) {
            const now = new Date();
            const formattedDate = now.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            document.getElementById('lastUpdated').textContent = 
                `Last Updated: ${formattedDate}`;

            // Hide loading spinner
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';

            // Update each cryptocurrency
            CRYPTO_IDS.forEach(coinId => {
                const cryptoData = CRYPTO_NAMES[coinId];
                const price = data[coinId]?.usd || 0;
                const change24h = data[coinId]?.usd_24h_change || 0;

                // Update price
                document.getElementById(`${cryptoData.id}-price`).textContent = 
                    `$${price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

                // Update 24h change
                const changeElement = document.getElementById(`${cryptoData.id}-change`);
                const changeValue = Math.abs(change24h).toFixed(2) + '%';
                const sign = change24h >= 0 ? '+' : '';
                
                changeElement.textContent = `${sign}${changeValue}`;
                
                // Update color based on change
                changeElement.className = 'change-value';
                if (change24h > 0) {
                    changeElement.classList.add('change-positive');
                } else if (change24h < 0) {
                    changeElement.classList.add('change-negative');
                } else {
                    changeElement.classList.add('change-neutral');
                }
            });
        }

        // Initialize the dashboard
        async function initDashboard() {
            console.log('Dashboard initializing...');
            
            // Initial fetch
            const data = await fetchCryptoData();
            if (data) {
                updateUI(data);
                console.log('UI updated with current prices');
            } else {
                console.error('Failed to fetch crypto data');
            }

            // Initialize charts on each card - use setTimeout to ensure DOM is ready
            setTimeout(() => {
                CRYPTO_IDS.forEach(coinId => {
                    const cryptoId = CRYPTO_NAMES[coinId].id;
                    console.log('Setting up chart for:', cryptoId);

                    // Initialize charts with event listeners scoped to each card container
                    const cardContainer = document.querySelector(`.crypto-card .timeframe-btn[data-crypto="${cryptoId}"]`).closest('.crypto-card');
                    const timeFrameButtons = cardContainer.querySelectorAll('.timeframe-btn[data-crypto="' + cryptoId + '"]');
                    const updateBtn = cardContainer.querySelector('.update-chart-btn');

                    console.log('Found container, buttons:', timeFrameButtons.length, 'updateBtn:', updateBtn);

                    // Initialize charts with event listeners
                    timeFrameButtons.forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            console.log('Timeframe button clicked:', e.target.dataset.days, 'days');
                            const target = e.target.closest('[data-crypto]');
                            if (target) {
                                updateChart(target.dataset.crypto, parseInt(target.dataset.days), cardContainer);
                            }
                        });
                    });

                    updateBtn.addEventListener('click', async () => {
                        // Find active timeframe button
                        const activeBtn = cardContainer.querySelector(`.timeframe-btn[data-crypto="${cryptoId}"].active`);
                        console.log('Update button clicked, active button:', activeBtn);
                        const days = activeBtn ? parseInt(activeBtn.dataset.days) : 1;
                        await updateChart(cryptoId, days, cardContainer);
                    });

                    // Initialize with 1 day data
                    updateChart(cryptoId, 1, cardContainer).then(() => {
                        updateBtn.textContent = 'Refresh Chart';
                        console.log(cryptoId + ' chart initialized');
                    });
                });
            }, 150);  // Small delay to ensure DOM is fully rendered

            // Set up interval to update every 5 minutes (300000 milliseconds)
            setInterval(async () => {
                console.log('Auto-refreshing at', new Date().toLocaleTimeString());
                const data = await fetchCryptoData();
                if (data) {
                    updateUI(data);
                }
            }, 300000); // 5 minutes
        }

        // Start the dashboard when page loads
        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
