<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard - BTC, SOL, ETH</title>
    <link href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00d4ff;
        }

        .timeframe-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .timeframe-btn {
            padding: 8px 16px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .timeframe-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        .timeframe-btn.active {
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            color: #1a1a2e;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
        }

        .chart-container {
            margin-top: 20px;
            position: relative;
            height: 200px;
            width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        #updateChartBtn {
            margin-top: 15px;
            padding: 8px 20px;
            background: linear-gradient(45deg, #00ff88, #00d4ff);
            border: none;
            border-radius: 20px;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #updateChartBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 255, 136, 0.4);
        }

        #updateChartBtn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .last-updated {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .crypto-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .crypto-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .crypto-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
        }

        .crypto-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btc .crypto-icon {
            background: linear-gradient(45deg, #f7931a, #ffb347);
            color: white;
        }

        .eth .crypto-icon {
            background: linear-gradient(45deg, #627eea, #a5b4fc);
            color: white;
        }

        .sol .crypto-icon {
            background: linear-gradient(45deg, #00ffa3, #7024e4);
            color: white;
        }

        .crypto-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .crypto-price {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .change-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .change-label {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .change-value {
            display: inline-flex;
            align-items: center;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .change-positive {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .change-negative {
            background: rgba(255, 0, 118, 0.2);
            color: #ff0076;
        }

        .change-neutral {
            background: rgba(160, 160, 160, 0.2);
            color: #a0a0a0;
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 20px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .crypto-price {
                font-size: 2rem;
            }

            .dashoard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Crypto Dashboard</h1>
            <div id="lastUpdated" class="last-updated">Updating...</div>
            <div id="statusIndicator" class="status-indicator">
                <div class="pulse"></div>
                <span>Live Updates Every 5 Minutes</span>
            </div>
        </header>

        <div id="loading" class="loading-spinner"></div>

        <div class="dashboard-grid" id="dashboard" style="display: none;">
            <!-- Bitcoin Card -->
            <div class="crypto-card btc">
                <div class="crypto-icon">₿</div>
                <div class="crypto-name">Bitcoin</div>
                <div class="crypto-price" id="btc-price">$70,000.00</div>
                <div class="change-container">
                    <span class="change-label">24h Change:</span>
                    <span class="change-value change-neutral" id="btc-change">--</span>
                </div>

                <h2>📈 Price History</h2>
                <div id="btc-chart-container" class="chart-container">
                    <canvas id="btc-chart" style="background: rgba(0, 212, 255, 0.1);"></canvas>
                </div>
                <div class="timeframe-selector">
                    <button class="timeframe-btn active" data-crypto="btc" data-days="1">24H</button>
                    <button class="timeframe-btn" data-crypto="btc" data-days="7">1W</button>
                    <button class="timeframe-btn" data-crypto="btc" data-days="30">1M</button>
                    <button class="timeframe-btn" data-crypto="btc" data-days="90">3M</button>
                    <button class="timeframe-btn" data-crypto="btc" data-days="180">6M</button>
                </div>
                <button class="update-chart-btn" data-crypto="btc">Update Chart</button>
            </div>

            <!-- Ethereum Card -->
            <div class="crypto-card eth">
                <div class="crypto-icon">Ξ</div>
                <div class="crypto-name">Ethereum</div>
                <div class="crypto-price" id="eth-price">$2,000.00</div>
                <div class="change-container">
                    <span class="change-label">24h Change:</span>
                    <span class="change-value change-neutral" id="eth-change">--</span>
                </div>

                <h2>📈 Price History</h2>
                <div id="eth-chart-container" class="chart-container">
                    <canvas id="eth-chart" style="background: rgba(98, 126, 234, 0.1);"></canvas>
                </div>
                <div class="timeframe-selector">
                    <button class="timeframe-btn active" data-crypto="eth" data-days="1">24H</button>
                    <button class="timeframe-btn" data-crypto="eth" data-days="7">1W</button>
                    <button class="timeframe-btn" data-crypto="eth" data-days="30">1M</button>
                    <button class="timeframe-btn" data-crypto="eth" data-days="90">3M</button>
                    <button class="timeframe-btn" data-crypto="eth" data-days="180">6M</button>
                </div>
                <button class="update-chart-btn" data-crypto="eth">Update Chart</button>
            </div>

            <!-- Solana Card -->
            <div class="crypto-card sol">
                <div class="crypto-icon">◈</div>
                <div class="crypto-name">Solana</div>
                <div class="crypto-price" id="sol-price">$80.00</div>
                <div class="change-container">
                    <span class="change-label">24h Change:</span>
                    <span class="change-value change-neutral" id="sol-change">--</span>
                </div>

                <h2>📈 Price History</h2>
                <div id="sol-chart-container" class="chart-container">
                    <canvas id="sol-chart" style="background: rgba(0, 255, 163, 0.1);"></canvas>
                </div>
                <div class="timeframe-selector">
                    <button class="timeframe-btn active" data-crypto="sol" data-days="1">24H</button>
                    <button class="timeframe-btn" data-crypto="sol" data-days="7">1W</button>
                    <button class="timeframe-btn" data-crypto="sol" data-days="30">1M</button>
                    <button class="timeframe-btn" data-crypto="sol" data-days="90">3M</button>
                    <button class="timeframe-btn" data-crypto="sol" data-days="180">6M</button>
                </div>
                <button class="update-chart-btn" data-crypto="sol">Update Chart</button>
            </div>
        </div>
    </div>

    <script>
        // Helper for staggering API requests to avoid rate limits
        const sleep = ms => new Promise(res => setTimeout(res, ms));
        
        // Cryptocurrencies to track
        const CRYPTO_IDS = ['bitcoin', 'ethereum', 'solana'];
        const CRYPTO_NAMES = {
            'bitcoin': { name: 'Bitcoin', symbol: '₿', id: 'btc' },
            'ethereum': { name: 'Ethereum', symbol: 'Ξ', id: 'eth' },
            'solana': { name: 'Solana', symbol: '◈', id: 'sol' }
        };

        // Store Chart.js instances
        const charts = {
            btc: null,
            eth: null,
            sol: null
        };

        // COINGECKO API CONFIGURATION
        const API_CONFIG = {
            // Your free CoinGecko API key
            API_KEY: 'CG-TgeUndKq2XWL5KihPygP7kFH',
            MIN_WAIT_BETWEEN_QUERIES: 1000, // 1 second minimum between requests
            MAX_RETRIES: 3,
            RETRY_DELAYS: [1000, 2000, 5000] // Exponential backoff in ms
        };

        // Request tracking
        let lastRequestTime = 0;

        // Get API URL with authentication
        // CoinGecko beta API requires the key as a parameter, not header
        function getApiUrl(baseUri) {
            const url = new URL(baseUri);
            
            if (API_CONFIG.API_KEY && API_CONFIG.API_KEY !== 'YOUR_API_KEY') {
                // Add API key as parameter for beta API
                url.searchParams.set('extension_api_key', API_CONFIG.API_KEY);
                console.log('✅ Using CoinGecko API key for authentication');
            }
            
            return url.toString();
        }

        // Wait for rate limiting
        async function waitForRateLimit() {
            const now = Date.now();
            const timeSinceLastRequest = now - lastRequestTime;
            
            if (timeSinceLastRequest < API_CONFIG.MIN_WAIT_BETWEEN_QUERIES) {
                const waitTime = API_CONFIG.MIN_WAIT_BETWEEN_QUERIES - timeSinceLastRequest;
                console.log(`Rate limit: Waiting ${waitTime}ms before API call`);
                await sleep(waitTime);
            }
            
            lastRequestTime = Date.now();
        }

        // Fetch with retry logic and error handling
        async function fetchWithRetry(url, description = 'API call', maxRetries = API_CONFIG.MAX_RETRIES) {
            for (let attempt = 0; attempt <= maxRetries; attempt++) {
                try {
                    await waitForRateLimit();
                    
                    const responseUrl = getApiUrl(url);
                    console.log(`${description}: ${responseUrl}`);
                    
                    const response = await fetch(responseUrl);
                    
                    const status = response.status;
                    
                    // Success
                    if (status === 200) {
                        return await response.json();
                    }
                    
                    // Rate limited (429)
                    if (status === 429) {
                        const retryAfter = response.headers.get('Retry-After') || 30;
                        const waitTime = Math.min(parseInt(retryAfter) * 1000, 5000);
                        console.warn(`⚠️ Rate limited (${description}). Waiting ${waitTime}ms. Attempt ${attempt + 1}/${maxRetries}`);
                        await sleep(waitTime);
                        continue;
                    }
                    
                    // Unauthorized (401)
                    if (status === 401) {
                        console.error('❌ 401 Unauthorized - API authentication failed');
                        throw new Error('API requires authentication. Please check your API key.');
                    }
                    
                    // Other errors
                    throw new Error(`HTTP ${status}: ${response.statusText}`);
                    
                } catch (error) {
                    if (attempt < maxRetries) {
                        const delay = API_CONFIG.RETRY_DELAYS[attempt] || 1000;
                        console.warn(`⚠️ ${description} attempt ${attempt + 1} failed: ${error.message}. Retrying in ${delay}ms...`);
                        await sleep(delay);
                        continue;
                    }
                    
                    console.error(`❌ ${description} failed after ${maxRetries + 1} attempts: ${error.message}`);
                    throw error;
                }
            }
            
            throw new Error('Unexpected error');
        }

        // Chart colors
        const chartColors = {
            btc: '#f7931a',
            eth: '#627eea',
            sol: '#00ffa3'
        };

        // Fetch crypto data from CoinGecko API
        async function fetchCryptoData() {
            try {
                const url = new URL('https://api.coingecko.com/api/v3/simple/price');
                url.searchParams.set('ids', CRYPTO_IDS.join(','));
                url.searchParams.set('vs_currencies', 'usd');
                url.searchParams.set('include_24h_change', 'true');
                
                console.log('Fetching current prices...');
                const data = await fetchWithRetry(url.toString(), 'Price fetch');
                return data;
            } catch (error) {
                console.error('Error fetching crypto data:', error.message);
                return null;
            }
        }

        // Fetch historical price data
        async function fetchHistoricalData(coinId, days) {
            const url = new URL('https://api.coingecko.com/api/v3/coins/' + coinId + '/market_chart');
            url.searchParams.set('vs_currency', 'usd');
            url.searchParams.set('days', days.toString());
            url.searchParams.set('interval', days < 7 ? 'hourly' : 'daily');

            const description = `Historical data for ${coinId}`;
            console.log(`${description}: ${days} days`);

            try {
                const data = await fetchWithRetry(url.toString(), description);

                // Handle different response structures
                if (data.prices && Array.isArray(data.prices) && data.prices.length > 0) {
                    console.log(`✅ ${coinId}: Retrieved ${data.prices.length} data points`);
                    return data.prices;
                } else if (data.market_chart && data.market_chart.prices) {
                    console.log(`✅ ${coinId}: Retrieved ${data.market_chart.prices.length} data points`);
                    return data.market_chart.prices;
                } else {
                    console.warn(`⚠️ ${coinId}: No prices in API response`);
                    return null;
                }
            } catch (error) {
                console.error(`❌ ${coinId} fetch failed: ${error.message}`);
                throw error;
            }
        }

        // Create chart for a cryptocurrency
        function createChart(cryptoId, ctx, color) {
            console.log(`createChart for ${cryptoId}, ctx:`, !!ctx);
            
            if (ctx) {
                if (charts[cryptoId]) {
                    console.log(`Destroying existing chart for ${cryptoId}`);
                    charts[cryptoId].destroy();
                }

                charts[cryptoId] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Price (USD)',
                            data: [],
                            borderColor: color,
                            backgroundColor: color + '20',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                backgroundColor: 'rgba(26, 26, 46, 0.9)',
                                titleColor: '#00d4ff',
                                bodyColor: '#ffffff',
                                borderColor: 'rgba(0, 212, 255, 0.3)',
                                borderWidth: 1,
                                padding: 12,
                                displayColors: true,
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.parsed.y !== null) {
                                            label += new Intl.NumberFormat('en-US', {
                                                style: 'currency',
                                                currency: 'USD'
                                            }).format(context.parsed.y);
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)'
                                },
                                ticks: {
                                    color: '#a0a0a0',
                                    maxTicksLimit: 8,
                                    callback: function(value, index, values) {
                                        const date = this.getLabelForValue(value);
                                        if (date instanceof Date) {
                                            return date.toLocaleDateString('en-US', {
                                                month: 'short',
                                                day: 'numeric'
                                            });
                                        }
                                        return date;
                                    }
                                }
                            },
                            y: {
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.05)'
                                },
                                ticks: {
                                    color: '#a0a0a0',
                                    callback: function(value) {
                                        return '$' + value.toLocaleString();
                                    }
                                }
                            }
                        },
                        animation: {
                            duration: 500,
                            easing: 'easeOutQuart'
                        }
                    }
                });
                
                console.log(`Created chart for ${cryptoId}:`, charts[cryptoId]);
            } else {
                console.error(`createChart: No context for ${cryptoId}`);
            }
        }

        // Update chart with data - FIXED for Chart.js v4.4.0
        function updateChartData(cryptoId, prices, color) {
            const canvas = document.getElementById(`${cryptoId}-chart`);
            const ctx = canvas?.getContext('2d');

            // Get labels and prices
            const labels = prices.map(item => {
                const date = new Date(item[0]);
                return date.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric'
                });
            });
            const priceValues = prices.map(item => item[1]);
            
            console.log(`updateChartData: ${labels.length} labels, ${priceValues.length} values`);

            if (charts[cryptoId]) {
                console.log(`🔄 Updating existing chart for ${cryptoId}`);
                const previousDataLength = charts[cryptoId].data.datasets[0].data.length;
                const labelsLength = labels.length;
                
                console.log(`📊 Data count: ${labelsLength} (was ${previousDataLength})`);
                
                // CRITICAL FIX FOR CHART.JS V4.4.0:
                // When data point count changes, we MUST tell Chart.js to not skip
                // the update by using update('none') first, then update() after
                // to force a redraw.
                
                // Step 1: Pause animation/update to prepare for data change
                charts[cryptoId].update('none');
                
                // Step 2: Completely replace the data object
                charts[cryptoId].data = {
                    labels: labels,
                    datasets: [{
                        label: 'Price (USD)',
                        data: priceValues,
                        borderColor: color,
                        backgroundColor: color + '20',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6
                    }]
                };
                
                // Step 3: Force full redraw by calling update() without args
                // This is CRITICAL - Chart.js v4 requires this when data count changes
                charts[cryptoId].update();
                
                console.log(`✅ Chart updated with ${labelsLength} data points`);
            } else {
                console.log(`Creating NEW chart for ${cryptoId}`);
                createChart(cryptoId, ctx, color);
                // Force update to draw immediately
                if (charts[cryptoId]) {
                    charts[cryptoId].data.labels = labels.slice(0, 10);
                    charts[cryptoId].data.datasets[0].data = priceValues.slice(0, 10);
                    charts[cryptoId].update();
                }
            }
        }

        // Fetch and update chart
        async function updateChart(cryptoId, days, btnContext = null, coinId = null) {
            let updateBtn;
            let btnContainer;
            
            console.log(`updateChart called for ${cryptoId}, days: ${days}, coinId: ${coinId}`);
            
            if (btnContext) {
                // When called from a timeframe button
                updateBtn = btnContext.querySelector('.update-chart-btn');
                btnContainer = btnContext;
            } else {
                // When called from the Update Chart button
                updateBtn = document.querySelector(`.update-chart-btn[data-crypto="${cryptoId}"]`);
                if (!updateBtn) {
                    console.error(`Could not find update button for ${cryptoId}`);
                    return;
                }
                btnContainer = updateBtn.closest('.crypto-card');
            }
            
            if (!btnContainer) {
                console.error(`Could not find card container for ${cryptoId}`);
                return;
            }
            
            // If coinId not provided, derive it from cryptoId
            if (!coinId) {
                const nameMatch = Object.keys(CRYPTO_NAMES).find(k => CRYPTO_NAMES[k].id === cryptoId);
                coinId = nameMatch || coinId;
            }
            
            console.log(`updateChart: Found container, setting active button to ${days} days, coinId: ${coinId}`);
            
            // Set active timeframe button - but only within THIS card!
            const timeFrameBtns = btnContainer.querySelectorAll('.timeframe-btn');
            timeFrameBtns.forEach(btn => {
                const shouldBeActive = btn.dataset.days === days.toString();
                btn.classList.toggle('active', shouldBeActive);
            });

            // Disable update button during fetch
            updateBtn.disabled = true;

            try {
                // Use coinId (bitcoin/ethereum/solana) NOT cryptoId (btc/eth/sol) for the API
                const data = await fetchHistoricalData(coinId, days);
                console.log(`updateChart: Retrieved ${data?.length || 0} data points`);
                if (data && data.length > 0) {
                    updateChartData(cryptoId, data, chartColors[cryptoId]);
                    console.log(`Successfully updated ${cryptoId} chart`);
                } else {
                    console.error(`No data returned for ${cryptoId}:`, {
                        data: !!data,
                        pricesLength: data?.length
                    });
                    alert('No chart data available');
                }
            } catch (error) {
                console.error(`Failed to update ${cryptoId} chart:`, error);
                console.error(`Error details:`, {
                    name: error?.name,
                    message: error?.message,
                    stack: error?.stack,
                    toString: error?.toString()
                });
                
                // Show meaningful error messages based on error type
                if (error.message.includes('authentication') || error.message.includes('401')) {
                    alert(`Authentication error: Unable to load chart data.

The CoinGecko API requires a valid API key for market chart data.

The current API key may have expired or been invalid. Please contact the developer.

Details: ${error?.message || 'Authentication failed'}`);
                } else if (error.message.includes('Rate')) {
                    alert(`Rate limit error: Unable to load chart data due to API rate limits.

Please wait 1-2 minutes and try again, or reduce the frequency of chart updates.

Details: ${error?.message || 'Rate limit exceeded'}`);
                } else {
                    alert(`Unable to load chart data: ${error?.message || 'Unknown error'}

This may be due to API rate limiting, network issues, or authentication problems.

Please wait a moment and try again.

Details: ${error?.message || 'Unknown error'}`);
                }
                
                console.error(`🚫 UI: Failed to update ${cryptoId} chart`);
            } finally {
                updateBtn.disabled = false;
            }
        }

        // Update UI with crypto data
        function updateUI(data) {
            const now = new Date();
            const formattedDate = now.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            document.getElementById('lastUpdated').textContent = 
                `Last Updated: ${formattedDate}`;

            // Hide loading spinner
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';

            // Update each cryptocurrency
            CRYPTO_IDS.forEach(coinId => {
                const cryptoData = CRYPTO_NAMES[coinId];
                const price = data[coinId]?.usd || 0;
                const change24h = data[coinId]?.usd_24h_change || 0;

                // Update price
                document.getElementById(`${cryptoData.id}-price`).textContent = 
                    `$${price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

                // Update 24h change
                const changeElement = document.getElementById(`${cryptoData.id}-change`);
                const changeValue = Math.abs(change24h).toFixed(2) + '%';
                const sign = change24h >= 0 ? '+' : '';
                
                changeElement.textContent = `${sign}${changeValue}`;
                
                // Update color based on change
                changeElement.className = 'change-value';
                if (change24h > 0) {
                    changeElement.classList.add('change-positive');
                } else if (change24h < 0) {
                    changeElement.classList.add('change-negative');
                } else {
                    changeElement.classList.add('change-neutral');
                }
            });
        }

        // Initialize the dashboard
        async function initDashboard() {
            console.log('Dashboard initializing...');
            
            // Initial fetch
            const data = await fetchCryptoData();
            if (data) {
                updateUI(data);
                console.log('UI updated with current prices');
            } else {
                console.error('Failed to fetch crypto data');
            }

            // Initialize charts on each card - use setTimeout to ensure DOM is ready
            setTimeout(() => {
                CRYPTO_IDS.forEach(coinId => {
                    const cryptoId = CRYPTO_NAMES[coinId].id;
                    console.log('Setting up chart for:', cryptoId);

                    // Initialize charts with event listeners scoped to each card container
                    const cardContainer = document.querySelector(`.crypto-card .timeframe-btn[data-crypto="${cryptoId}"]`).closest('.crypto-card');
                    const timeFrameButtons = cardContainer.querySelectorAll('.timeframe-btn[data-crypto="' + cryptoId + '"]');
                    const updateBtn = cardContainer.querySelector('.update-chart-btn');

                    console.log('Found container, buttons:', timeFrameButtons.length, 'updateBtn:', updateBtn);

                    // Initialize charts with event listeners
                    timeFrameButtons.forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            console.log('Timeframe button clicked:', e.target.dataset.days, 'days');
                            const target = e.target.closest('[data-crypto]');
                            if (target) {
                                const cryptoId = target.dataset.crypto;
                                const days = parseInt(target.dataset.days);
                                const coinId = Object.keys(CRYPTO_NAMES).find(k => CRYPTO_NAMES[k].id === cryptoId);
                                await updateChart(cryptoId, days, cardContainer, coinId);
                            }
                        });
                    });

                    updateBtn.addEventListener('click', async () => {
                        // Find active timeframe button
                        const activeBtn = cardContainer.querySelector(`.timeframe-btn[data-crypto="${cryptoId}"].active`);
                        console.log('Update button clicked, active button:', activeBtn);
                        const days = activeBtn ? parseInt(activeBtn.dataset.days) : 1;
                        await updateChart(cryptoId, days, cardContainer, coinId);
                    });

                    // Initialize with 1 day data - pass both cryptoId and coinId
                    updateChart(cryptoId, 1, cardContainer, coinId);
                });
            }, 150);  // Small delay to ensure DOM is fully rendered

            // Set up interval to update every 5 minutes (300000 milliseconds)
            setInterval(async () => {
                console.log('Auto-refreshing at', new Date().toLocaleTimeString());
                const data = await fetchCryptoData();
                if (data) {
                    updateUI(data);
                }
            }, 300000); // 5 minutes
        }

        // Start the dashboard when page loads
        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
